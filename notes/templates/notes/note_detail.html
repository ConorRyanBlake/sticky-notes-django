{% extends 'base.html' %}

{% block title %}{{ note.title }}{% endblock %}

{% block content %}
<div class="card sticky-note">
    <div class="card-body">
        <h1 class="card-title">{{ note.title }}</h1>
        <p class="card-text">{{ note.content|linebreaks }}</p>
        <small class="text-muted">Created {{ note.created_at|date:"d M Y, H:i" }}</small>
    </div>
</div>

<div class="mt-3">
    <a href="{% url 'note_update' pk=note.pk %}" class="btn btn-warning">Edit</a>
    <a href="{% url 'note_delete' pk=note.pk %}" class="btn btn-danger">Delete</a>
    <a href="{% url 'note_list' %}" class="btn btn-secondary">Back to list</a>
</div>
{% endblock %}
